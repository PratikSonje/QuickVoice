version: 1
applications:
  - appRoot: apps/web
    frontend:
      phases:
        preBuild:
          commands:
            - corepack enable
            - corepack prepare pnpm@9.0.0 --activate
            - cd ../.. && pnpm install
        build:
          commands:
            - cd ../.. && pnpm turbo run build --filter=web...
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
